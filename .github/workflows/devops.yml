name: CI/CD Pipeline to AKS on 5.0

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Azure Container Registry Login
      run: |
        az acr login --name ${{ secrets.ACR_NAME }}

    - name: Build and Push Docker Image
      run: |
        ACR_SERVER=${{ secrets.ACR_NAME }}.azurecr.io
        IMAGE_NAME=my-app
        TAG=${{ github.sha }}
        
        docker build -t $ACR_SERVER/$IMAGE_NAME:$TAG .
        docker push $ACR_SERVER/$IMAGE_NAME:$TAG
        docker tag $ACR_SERVER/$IMAGE_NAME:$TAG $ACR_SERVER/$IMAGE_NAME:latest
        docker push $ACR_SERVER/$IMAGE_NAME:latest

    - name: Get AKS Credentials
      uses: azure/aks-set-context@v3
      with:
        resource-group: ${{ secrets.RESOURCE_GROUP }}
        cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

    - name: Deploy to Kubernetes (AKS)
      run: |
        ACR_SERVER=${{ secrets.ACR_NAME }}.azurecr.io
        IMAGE_NAME=my-app
        TAG=${{ github.sha }}
        
        kubectl set image deployment/my-app app-container=$ACR_SERVER/$IMAGE_NAME:$TAG
        kubectl rollout status deployment/my-app
